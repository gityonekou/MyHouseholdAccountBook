<!DOCTYPE html>
<html lang="ja" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
		rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
		crossorigin="anonymous">
<link th:href="@{/css/MyHouseholdAccountBookCommon.css}" rel="stylesheet" type="text/css">
<style>
.nav-tabs a.nav-link { padding: .5rem 1rem; }
</style>
<title>月別固定費一覧</title>
</head>
<body>
	<!--/* ヘッダー */-->
	<div id="header" th:insert="~{layout/myhacbookheader::header}">ヘッダー</div>

	<!--/* ボディ部 */-->
	<div class="col">
		<div class="card">
			<div class="card-body">
				<h5 class="card-title">月別固定費一覧</h5>
				<th:block th:each="message : ${messages}">
					<code><span th:text="${message}">何かのメッセージがある場合はここに表示</span></code></br>
				</th:block>
			</div>

			<!-- ===== タブナビゲーション ===== -->
			<nav>
				<div class="nav nav-tabs mb-3" id="nav-tab" role="tablist">
					<!-- ① 固定費管理タブ [遷移] -->
					<a class="nav-link" th:href="@{/myhacbook/managebaseinfo/fixedcostinfo/tabload/}">固定費管理</a>
					<!-- ② 年間固定費合計タブ [遷移] -->
					<a class="nav-link" th:href="@{/myhacbook/managebaseinfo/fixedcostinfo/annualsummary/}">年間固定費合計</a>
					<!-- ③ 月別固定費一覧タブ [現在アクティブ] -->
					<button class="nav-link active" type="button" role="tab" aria-selected="true" disabled>月別固定費一覧</button>
				</div>
			</nav>

			<!-- 月別固定費一覧表示エリア -->
			<div class="card-body">
				<div class="card">
					<div class="card-body">
						<!-- 月ナビゲーション -->
						<div class="d-flex align-items-center mb-3">
							<a class="btn btn-outline-secondary btn-sm me-2"
							   th:href="@{/myhacbook/managebaseinfo/fixedcostinfo/monthlydetail/(month=${prevMonth})}">&lt; 前月</a>
							<h6 class="mb-0 mx-2" th:text="${displayMonthLabel} + 'の固定費一覧'">11月の固定費一覧</h6>
							<a class="btn btn-outline-secondary btn-sm ms-2"
							   th:href="@{/myhacbook/managebaseinfo/fixedcostinfo/monthlydetail/(month=${nextMonth})}">次月 &gt;</a>
						</div>

						<th:block th:if="${#lists.size(fixedCostItemList)} > 0">
						<p class="card-text">更新対象の固定支出項目を選択してください。</p>
						<table class="table table-sm table-bordered table-hover">
							<thead>
								<tr class="table-secondary">
								<th scope="col" class="w20">支出項目名</th>
								<th scope="col" class="w25">支払名</th>
								<th scope="col" class="w10">支払月</th>
								<th scope="col" class="w10">支払日</th>
								<th scope="col" class="w10">支払金額</th>
								<th scope="col">その他任意詳細</th>
								</tr>
							</thead>
							<tbody>
								<th:block th:each="item, itemStat : ${fixedCostItemList}">
								<th:block th:if="${itemStat.odd}"><tr th:data-href="@{/myhacbook/managebaseinfo/fixedcostinfo/select(fixedCostCode=${item.fixedCostCode})}"></th:block>
								<th:block th:if="${itemStat.even}"><tr class="table-warning" th:data-href="@{/myhacbook/managebaseinfo/fixedcostinfo/select(fixedCostCode=${item.fixedCostCode})}"></th:block>
									<td th:text="${item.sisyutuItemName}">支出項目名</td>
									<td th:text="${item.shiharaiName}">支払名</td>
									<td th:text="${item.shiharaiTuki}">支払月</td>
									<td th:text="${item.shiharaiDay}">支払日</td>
									<td th:text="${item.shiharaiKingaku}" align="right">支払金額</td>
									<td th:text="${item.optionalContext}">その他任意詳細</td>
								</tr>
								</th:block>
								<tr class="table-success">
									<td colspan="4" th:text="${displayMonthLabel} + '合計'">月合計ラベル</td>
									<td th:text="${monthlyTotal}" align="right">月合計</td>
									<td></td>
								</tr>
							</tbody>
						</table>
						</th:block>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!--/* フッター共通jsのインクルード */-->
	<div id="footer" th:insert="~{layout/myhacbookfooter::footer}">フッター</div>
	<!--/* テーブル行クリックスクリプト */-->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script th:src="@{/js/table_tr_click_script.js}"></script>

</body>
</html>
